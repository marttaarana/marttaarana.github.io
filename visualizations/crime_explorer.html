      background: #fff;

      cursor: pointer; appearance: auto;
    }
    select:focus { outline: none; border-color: #cc0000; }

    .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      padding: 5px 13px; border-radius: 20px; font-size: 12px;
      cursor: pointer; border: 1.5px solid #ddd; background: #fff;
      font-family: 'Georgia', serif; transition: all 0.15s;

    .pill:hover { border-color: #cc0000; color: #cc0000; }
    .pill.active { background: #cc0000; border-color: #cc0000; color: #fff; }
    .pill.active-blue { background: #1a4f7a; border-color: #1a4f7a; color: #fff; }

    #chart { width: 100%; height: calc(100vh - 100px); }
